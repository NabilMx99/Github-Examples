name: Matrix Strategies Workflow

on:
  push:
    branches:
      - main

jobs:
  example-matrix:
    strategy:
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04, ubuntu-latest]
        node: [18, 20]

        exclude:
          - os: ubuntu-22.04
            node: 20

        include:
          - os: ubuntu-22.04
            node: 20
            label: "special-case"

    runs-on: ${{ matrix.os }}
    steps:
      - name: Say Hello
        run: |
          echo "Hello from ${{ matrix.os }} with Node ${{ matrix.node }}!"
          echo "Label: ${{ matrix.label || 'default' }}"
