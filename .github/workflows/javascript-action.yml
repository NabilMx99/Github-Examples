name: JavaScript Action Workflow

on:
  push:
    branches:
      - main

jobs:
  hello_world_job:
    name: A job to say hello
    runs-on: ubuntu-latest

    steps:
      - name: Hello world action step
        id: hello
        uses: NabilMx99/hello-world-javascript-action@a034a96845f7f9087bb08a36d3bab9e904c5213f
        with:
          who-to-greet: Nabil Al Masri

      - name: Get the output time
        run: echo "The time was ${{ steps.hello.outputs.time }}"
