name: Artifacts Workflow

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Create a file
        run: |
          mkdir -p ./components/slugify
          echo 'Hello' > ./components/slugify/hello.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: components-artifact
          path: ./components
          retention-days: 1

  modify:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: components-artifact

      - name: Modify file
        run: |
          echo 'World' >> ./slugify/hello.txt

      - name: Show result
        run: cat ./slugify/hello.txt
