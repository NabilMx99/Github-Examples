name: Troubleshooting Workflow

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to comment on'
        required: true
        type: number

permissions:
  contents: read
  issues: write
    
jobs:
  comment-on-issue:
    runs-on: ubuntu-latest

    steps:
      - name: Create an issue comment
        run: |
          curl --fail -s \
          -w "HTTP %{http_code}\n" \
          -o /dev/null \
          -X POST \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          -H "X-GitHub-Api-Version: 2026-03-10" \
          https://api.github.com/repos/${{ github.repository }}/issues/${{ inputs.issue_number }}/comments \
          -d '{"body":"Workflow executed successfully! ✅"}'
